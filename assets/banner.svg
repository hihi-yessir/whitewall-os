<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="meshGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="35%" stop-color="#0D1020"/>
      <stop offset="65%" stop-color="#0A0E1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="fadeL" x1="0%" y1="0%" x2="25%" y2="0%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeR" x1="80%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A0A0A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="fadeT" x1="0%" y1="0%" x2="0%" y2="10%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeB" x1="0%" y1="90%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#meshGlow)"/>

  <!-- Perspective mesh (right side, converging toward vanishing point ~1300,200) -->
  <g opacity="0.06" stroke="#EEEEEE" stroke-width="0.8" fill="none">
    <!-- Horizontal perspective lines -->
    <line x1="500" y1="0" x2="1300" y2="180"/>
    <line x1="500" y1="60" x2="1300" y2="186"/>
    <line x1="500" y1="130" x2="1300" y2="193"/>
    <line x1="500" y1="200" x2="1300" y2="200"/>
    <line x1="500" y1="270" x2="1300" y2="207"/>
    <line x1="500" y1="340" x2="1300" y2="214"/>
    <line x1="500" y1="400" x2="1300" y2="220"/>
    <!-- Vertical lines (slightly converging) -->
    <line x1="560" y1="0" x2="570" y2="400"/>
    <line x1="650" y1="0" x2="655" y2="400"/>
    <line x1="740" y1="0" x2="740" y2="400"/>
    <line x1="830" y1="0" x2="825" y2="400"/>
    <line x1="920" y1="0" x2="910" y2="400"/>
    <line x1="1010" y1="0" x2="995" y2="400"/>
    <line x1="1100" y1="0" x2="1080" y2="400"/>
  </g>

  <!-- Blue glow gate lines (verification walls) -->
  <g stroke="#375BD2" fill="none">
    <line x1="700" y1="40" x2="695" y2="360" stroke-width="1.5" opacity="0.12"/>
    <line x1="820" y1="40" x2="812" y2="360" stroke-width="1.5" opacity="0.18"/>
    <line x1="940" y1="40" x2="928" y2="360" stroke-width="1.5" opacity="0.22"/>
    <line x1="1060" y1="40" x2="1045" y2="360" stroke-width="1.5" opacity="0.15"/>
  </g>

  <!-- Agent particles with soft glow (opacity-based, no filter) -->
  <!-- Approaching (blue) -->
  <circle cx="660" cy="130" r="6" fill="#375BD2" opacity="0.12"/>
  <circle cx="660" cy="130" r="3" fill="#375BD2" opacity="0.7"/>
  <line x1="635" y1="130" x2="657" y2="130" stroke="#375BD2" stroke-width="1.5" opacity="0.3"/>

  <circle cx="680" cy="280" r="5" fill="#375BD2" opacity="0.1"/>
  <circle cx="680" cy="280" r="2.5" fill="#375BD2" opacity="0.5"/>
  <line x1="660" y1="280" x2="677" y2="280" stroke="#375BD2" stroke-width="1" opacity="0.2"/>

  <!-- Through gate 1 (brighter blue) -->
  <circle cx="770" cy="180" r="6" fill="#375BD2" opacity="0.15"/>
  <circle cx="770" cy="180" r="3" fill="#375BD2" opacity="0.8"/>
  <line x1="740" y1="180" x2="767" y2="180" stroke="#375BD2" stroke-width="1.5" opacity="0.35"/>

  <!-- Through gate 2 (turning green) -->
  <circle cx="890" cy="150" r="7" fill="#2EAD6B" opacity="0.12"/>
  <circle cx="890" cy="150" r="3" fill="#2EAD6B" opacity="0.7"/>
  <line x1="855" y1="150" x2="887" y2="150" stroke="#2EAD6B" stroke-width="1.5" opacity="0.3"/>

  <circle cx="870" cy="260" r="5" fill="#2EAD6B" opacity="0.1"/>
  <circle cx="870" cy="260" r="2.5" fill="#2EAD6B" opacity="0.6"/>
  <line x1="845" y1="260" x2="867" y2="260" stroke="#2EAD6B" stroke-width="1" opacity="0.25"/>

  <!-- Fully verified (bright green) -->
  <circle cx="1010" cy="200" r="8" fill="#2EAD6B" opacity="0.12"/>
  <circle cx="1010" cy="200" r="3.5" fill="#2EAD6B" opacity="0.85"/>
  <line x1="970" y1="200" x2="1006" y2="200" stroke="#2EAD6B" stroke-width="1.5" opacity="0.35"/>

  <circle cx="1000" cy="120" r="6" fill="#2EAD6B" opacity="0.1"/>
  <circle cx="1000" cy="120" r="2.5" fill="#2EAD6B" opacity="0.7"/>
  <line x1="965" y1="120" x2="997" y2="120" stroke="#2EAD6B" stroke-width="1" opacity="0.25"/>

  <!-- Blocked (red, fading) -->
  <circle cx="730" cy="310" r="4" fill="#D94040" opacity="0.08"/>
  <circle cx="730" cy="310" r="2" fill="#D94040" opacity="0.4"/>

  <circle cx="850" cy="90" r="3" fill="#D94040" opacity="0.06"/>
  <circle cx="850" cy="90" r="1.5" fill="#D94040" opacity="0.3"/>

  <!-- Edge fades -->
  <rect width="1200" height="400" fill="url(#fadeL)"/>
  <rect width="1200" height="400" fill="url(#fadeR)"/>
  <rect width="1200" height="400" fill="url(#fadeT)"/>
  <rect width="1200" height="400" fill="url(#fadeB)"/>

  <!-- Logo: three bars (bigger) -->
  <rect x="80" y="132" width="7" height="40" rx="1.5" fill="#EEEEEE" opacity="0.3"/>
  <rect x="93" y="132" width="7" height="40" rx="1.5" fill="#EEEEEE" opacity="0.6"/>
  <rect x="106" y="132" width="7" height="40" rx="1.5" fill="#EEEEEE" opacity="0.9"/>

  <!-- Title -->
  <text x="126" y="165" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="900" letter-spacing="3" fill="#EEEEEE">WHITEWALL OS</text>

  <!-- Tagline -->
  <text x="82" y="210" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="400" fill="#EEEEEE" opacity="0.45">On-chain identity and access control for AI agents</text>

  <!-- Tier badges -->
  <g transform="translate(82, 248)">
    <rect width="74" height="26" rx="4" fill="none" stroke="#375BD2" stroke-width="1.2" opacity="0.5"/>
    <text x="37" y="17" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#375BD2" text-anchor="middle" letter-spacing="1">ERC-8004</text>
  </g>
  <g transform="translate(166, 248)">
    <rect width="52" height="26" rx="4" fill="none" stroke="#375BD2" stroke-width="1.2" opacity="0.5"/>
    <text x="26" y="17" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#375BD2" text-anchor="middle" letter-spacing="1">ACE</text>
  </g>
  <g transform="translate(228, 248)">
    <rect width="52" height="26" rx="4" fill="none" stroke="#375BD2" stroke-width="1.2" opacity="0.5"/>
    <text x="26" y="17" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#375BD2" text-anchor="middle" letter-spacing="1">CRE</text>
  </g>
  <g transform="translate(290, 248)">
    <rect width="52" height="26" rx="4" fill="none" stroke="#375BD2" stroke-width="1.2" opacity="0.5"/>
    <text x="26" y="17" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#375BD2" text-anchor="middle" letter-spacing="1">TEE</text>
  </g>
</svg>
