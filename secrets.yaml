# CRE Secrets Configuration
# Secrets are stored in DON vault (TEE enclave) — never exposed to individual nodes
# For simulation, these are resolved from environment variables (.env)

secretsNames:
  STRIPE_SECRET_KEY_B64:
    - STRIPE_SECRET_KEY_B64
  PLAID_CLIENT_ID:
    - PLAID_CLIENT_ID
  PLAID_SECRET:
    - PLAID_SECRET
  PLAID_ACCESS_TOKEN:
    - PLAID_ACCESS_TOKEN
